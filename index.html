body{

.btn{

padding:18px 42px;

background:#1DB954;

border-radius:60px;

color:#fff;

text-decoration:none;

font-size:20px;

font-weight:bold;

transition:.3s;

}

.btn:hover{

background:#14863c;

transform:scale(1.05);

.note{
